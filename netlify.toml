[build]
  command = "npx expo export --platform web"
  publish = "dist"

# EXPO_PUBLIC_* vars are intentionally public — they're embedded in client-side
# JS by design. EXPO_PUBLIC_SUPABASE_URL is the project URL (not a secret; the
# anon key is required to actually query it). EXPO_PUBLIC_POSTHOG_HOST is the
# standard PostHog cloud endpoint. Tell Netlify's scanner to skip them.
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "EXPO_PUBLIC_POSTHOG_HOST,EXPO_PUBLIC_SUPABASE_URL"

# /download → /  (preserve query string for source/trip attribution).
# The standalone beta-signup page was collapsed into the landing in 2026-04;
# legacy SMS install CTAs still hit /download — they get a 301 here.
[[redirects]]
  from = "/download"
  to = "/"
  status = 301
  force = true

# Universal-link manifests — must be served literally (no SPA fallback) and
# with `Content-Type: application/json`. iOS rejects AASA without it.
# These rules MUST come before the SPA catchall below.
[[redirects]]
  from = "/.well-known/apple-app-site-association"
  to = "/.well-known/apple-app-site-association"
  status = 200
  force = true

[[redirects]]
  from = "/.well-known/assetlinks.json"
  to = "/.well-known/assetlinks.json"
  status = 200
  force = true

[[headers]]
  for = "/.well-known/apple-app-site-association"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/.well-known/assetlinks.json"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=300"

# SPA fallback — all other routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-lived cache for hashed Expo bundles
[[headers]]
  for = "/_expo/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
