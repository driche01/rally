# Pre-login OTP flows: caller has no JWT yet (they're trying to log in
# or claim a phone). The new sb_publishable_* anon key isn't JWT-format
# and the gateway rejects it before our handler runs. Each function
# does its own rate-limit / phone validation in-handler.
[functions.request-phone-login-otp]
verify_jwt = false

[functions.verify-phone-login-otp]
verify_jwt = false

[functions.claim-otp]
verify_jwt = false

# Authed endpoints that still need verify_jwt=false because the
# sb_publishable_* anon key isn't JWT-format. We extract + validate the
# real user JWT in-handler via supabase-js getUser(token).
[functions.request-phone-change-otp]
verify_jwt = false

[functions.verify-phone-change-otp]
verify_jwt = false
